services:
  backend:
    build: .
    ports:
      - "8923:8923"
    volumes:
      - ./backend:/app/backend          # 源码挂载，修改实时生效
      - ./media:/app/media
      - ./prompt_gallery.db:/app/prompt_gallery.db
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8923 --reload
    restart: unless-stopped

  frontend:
    image: node:20-slim
    working_dir: /app
    environment:
      - API_URL=http://backend:8923
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "4831:4831"
    volumes:
      - .:/app
    depends_on:
      - backend
    restart: unless-stopped
